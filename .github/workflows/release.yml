name: Release package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
      - run: npm ci
      # Use the job token (not a repo secret named GITHUB_*). With packages:write
      # this can publish to npm.pkg.github.com for this repository's packages.
      - run: npm publish --ignore-scripts
        env:
          VINACO_GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
